<style>
  /* --- 0. Import Fonts & Basic Setup --- */
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&display=swap');

  :root {
    /* Vintage Botanical Palette */
    --col-dusky-rose: #D9BCAF;
    --col-thistle: #8A9688;
    --col-hawthorne: #283D3B;
    --col-royal: #795663;
    --col-blue-noir: #011627;

    /* Map to System Variables */
    --color-purple: var(--col-hawthorne); 
    --color-pink: var(--col-royal);
    --color-magenta: var(--col-royal);
    --color-orange: var(--col-dusky-rose);
    --color-yellow: var(--col-thistle);
    --color-light-yellow: #F9F871;
    --color-green: #5c7c5a;

    --text-color: var(--col-blue-noir);
    --bg-color: #F9F7F5; 
    --nav-bg: #FFFFFF; 
    --nav-border: var(--col-dusky-rose);
    --shadow-light: 0 2px 4px rgba(40, 61, 59, 0.05);
    --shadow-medium: 0 4px 8px rgba(40, 61, 59, 0.1);
  }

  /* --- ⚠️ ส่วนสำคัญ: CSS สำหรับหมุดแผนที่ (Pin Styles) --- */
  /* ต้องมีส่วนนี้ หมุดถึงจะแสดง */
  .leaflet-container {
    font-family: 'Sarabun', sans-serif !important;
    font-size: 14px;
  }
  
  /* ตัวกล่องครอบไอคอน (ต้องไม่มีขอบ ไม่มีพื้นหลัง) */
  .custom-div-icon {
    background: transparent !important;
    border: none !important;
  }
  
  /* ตัวหมุดวงกลม */
  .pin-outer {
    width: 18px; 
    height: 18px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5); /* เพิ่มเงาให้ชัดขึ้น */
    display: block;
    margin: 0 auto;
    position: relative;
  }

  /* สีหมุด (ตามสถานะ) */
  .pin-neuter-done { background-color: #28a745 !important; } /* เขียว */
  .pin-neuter-not { background-color: #dc3545 !important; }  /* แดง */
  .pin-neuter-unknown { background-color: #6c757d !important; } /* เทา */
  
  .pin-behav-friendly { background-color: #28a745 !important; } /* เขียว */
  .pin-behav-feeder { background-color: #ffc107 !important; }   /* เหลือง */
  .pin-behav-danger { background-color: #dc3545 !important; }   /* แดง */

  /* --- จบส่วนหมุด --- */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    background-color: var(--bg-color);
    color: var(--text-color);
  }

  /* --- 1. Loader --- */
  #loader-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(255, 255, 255, 0.95);
    display: flex; justify-content: center; align-items: center;
    flex-direction: column; z-index: 9999; transition: opacity 0.3s ease;
  }
  .loader-spinner {
    border: 6px solid #eee; border-top: 6px solid var(--col-hawthorne);
    border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
  }
  #loader-overlay p { margin-top: 20px; font-family: 'Kanit', sans-serif; font-size: 18px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* --- 2. Nav Bar --- */
  #app-navbar {
    background-color: var(--nav-bg); height: 70px; border-bottom: 1px solid var(--nav-border);
    display: flex; justify-content: center; align-items: center; padding: 0 15px;
    position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow-light);
  }
  .navbar-brand { display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; }
  .navbar-logo { height: 45px; width: 45px; margin-right: 10px; border-radius: 5px; flex-shrink: 0; }
  .navbar-title {
    font-family: 'Kanit', sans-serif; font-size: 20px; font-weight: 500; color: var(--col-hawthorne);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* --- 2.1 Menu Bar --- */
  #main-menu-bar {
    background-color: #ffffff; border-bottom: 1px solid var(--nav-border); padding: 10px 15px;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; box-shadow: var(--shadow-light);
  }
  .menu-welcome { font-family: 'Kanit', sans-serif; font-size: 16px; color: var(--text-color); margin-right: 10px; padding: 5px 0; }
  
  .nav-button {
    font-family: 'Kanit', sans-serif; font-size: 15px;
    background-color: #f0f2f1; border: 1px solid transparent; cursor: pointer;
    display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px;
    transition: all 0.2s ease; color: var(--col-hawthorne);
  }
  #nav-login-btn { background-color: var(--col-hawthorne); color: white; }
  #nav-login-btn:hover { background-color: #1e2e2c; transform: translateY(-1px); }
  #nav-logout-btn { background-color: var(--col-royal); color: white; }
  #nav-logout-btn:hover { background-color: #5e434d; transform: translateY(-1px); }
  #nav-stray-btn { background-color: var(--col-thistle); color: white; }
  #nav-stray-btn:hover { background-color: #768274; transform: translateY(-1px); }
  .nav-button:hover {
    background-color: var(--col-dusky-rose); color: var(--col-blue-noir); transform: translateY(-1px); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* --- 3. Main Content --- */
  #app-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page-active { display: block; }

  /* --- 4. Dashboard & Cards --- */
  h2.dashboard-title { font-family: 'Kanit', sans-serif; font-size: 26px; font-weight: 600; margin-bottom: 20px; color: var(--col-hawthorne); }
  .dashboard-grid { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 20px; }
  .dashboard-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  
  .summary-card {
    background-color: #ffffff; border-radius: 24px; padding: 24px 24px 20px;
    box-shadow: 0 18px 40px rgba(20, 35, 34, 0.08); color: white; position: relative; overflow: hidden;
    min-height: 180px;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    right: -40px;
    top: -40px;
    opacity: 0.18;
    background: rgba(255,255,255,0.35);
  }
  .summary-card::after {
    content: '';
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    left: -25px;
    bottom: -20px;
    opacity: 0.14;
    background: rgba(255,255,255,0.2);
  }
  .summary-card .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .summary-card .card-icon {
    font-size: 34px;
    background: rgba(255,255,255,0.2);
    width: 64px;
    height: 64px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 6px rgba(255,255,255,0.25);
  }
  .summary-card .card-title { font-family: 'Kanit', sans-serif; font-size: 16px; font-weight: 500; opacity: 0.95; margin-bottom: 8px; }
  .summary-card .card-value-main { font-family: 'Kanit', sans-serif; font-size: 36px; font-weight: 700; line-height: 1.05; color: #fff; }
  .summary-card .card-value-main .unit { font-size: 16px; font-weight: 500; opacity: 0.85; }
  .summary-card .card-footer { margin-top: 20px; font-family: 'Sarabun', sans-serif; font-size: 14px; opacity: 0.9; line-height: 1.6; }
  .card-color-1 { background: linear-gradient(135deg, #3d5b50, #0f2927); }
  .card-color-2 { background: linear-gradient(135deg, #5f3d6f, #2b1f3c); }
  .card-color-3 { background: linear-gradient(135deg, #5a5b8a, #2b2f4f); }
  .card-color-4 { background: linear-gradient(135deg, #d9a77a, #7b4c79); }
  .card-color-5 { background: linear-gradient(135deg, #6f8b72, #2c4239); }
  .card-color-6 { background: linear-gradient(135deg, #2c3a42, #122123); }

  /* Charts Section */
  .charts-section { margin-top: 40px; }
  .charts-section h3 { font-family: 'Kanit', sans-serif; font-size: 24px; font-weight: 700; color: var(--col-blue-noir); text-align: center; margin-bottom: 18px; letter-spacing: 0.5px; }
  .charts-grid { display: grid; grid-template-columns: repeat(2, minmax(280px, 1fr)); gap: 20px; }
  .chart-container {
    background-color: #ffffff;
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 18px 35px rgba(22, 36, 37, 0.08);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .chart-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chart-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .chart-card-title {
    font-family: 'Kanit', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--col-blue-noir);
  }
  .chart-card-subtitle {
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    color: #6f7a86;
    line-height: 1.5;
    max-width: 70%;
  }
  .chart-card-body {
    width: 100%;
    position: relative;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .chart-card-body canvas { width: 100% !important; height: 100% !important; max-height: 320px; }

  .progress-card {
    display: grid;
    gap: 16px;
  }
  .progress-meta { font-family: 'Kanit', sans-serif; font-size: 0.98rem; color: #24323b; font-weight: 700; text-align: left; }
  
  /* Circular Progress */
  .circular-progress {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto;
  }
  .progress-ring {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .progress-ring-bg {
    fill: none;
    stroke: #e8f0f5;
    stroke-width: 8;
  }
  .progress-ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 339.3; /* 2 * π * 54 */
    stroke-dashoffset: 339.3;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  #vaccination-ring {
    stroke: url(#vacGradient);
  }
  #neuter-ring {
    stroke: url(#neuterGradient);
  }
  .progress-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .progress-icon {
    font-size: 32px;
    line-height: 1;
  }
  .progress-percent {
    font-family: 'Kanit', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--col-blue-noir);
  }

  /* --- 5. Form Styles --- */
  .form-container { max-width: 500px; margin: 20px auto; background-color: #ffffff; border-radius: 12px; box-shadow: var(--shadow-medium); padding: 30px 40px; }
  .form-title { font-family: 'Kanit', sans-serif; font-size: 24px; font-weight: 500; text-align: center; margin-bottom: 25px; color: var(--col-hawthorne); }
  .form-group { margin-bottom: 20px; }
  .form-group label { font-family: 'Kanit', sans-serif; display: block; margin-bottom: 8px; font-size: 16px; color: #555; }
  .form-input {
    width: 100%; padding: 12px 15px; font-family: 'Sarabun', sans-serif; font-size: 16px;
    border: 1px solid #ccc; border-radius: 8px; transition: border-color 0.2s ease;
  }
  input[type="number"].form-input { font-family: 'Kanit', sans-serif; text-align: center; }
  select.form-input { font-family: 'Kanit', sans-serif; }
  textarea.form-input { min-height: 80px; }
  .form-input:focus { border-color: var(--col-hawthorne); outline: none; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .form-grid-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

  .form-button {
    width: 100%; padding: 12px; font-family: 'Kanit', sans-serif; font-size: 18px; font-weight: 500;
    color: white; background-color: var(--col-hawthorne); border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s ease;
  }
  .form-button.secondary { background-color: #aaa; } .form-button.secondary:hover { background-color: #888; }
  .form-button.success { background-color: var(--color-green); } .form-button.success:hover { background-color: #4a6649; }
  .form-button:hover { background-color: #1e2e2c; }
  
  .form-link { display: block; width: 100%; text-align: center; margin-top: 25px; font-family: 'Kanit', sans-serif; font-size: 16px; color: var(--col-royal); cursor: pointer; }
  .form-link.small { margin-top: 15px; font-size: 15px; color: var(--col-thistle); }
  .form-link:hover { text-decoration: underline; }
  .error-message { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-family: 'Kanit', sans-serif; font-size: 16px; }
  
  .swal2-popup { font-family: 'Kanit', sans-serif !important; border-radius: 12px !important; }
  .swal2-html-container { font-family: 'Sarabun', sans-serif !important; font-size: 18px !important; }
  .swal2-confirm { background-color: var(--col-hawthorne) !important; }

  /* --- 6. Management & Tables --- */
  .management-section { background-color: #ffffff; border-radius: 12px; padding: 25px; box-shadow: var(--shadow-light); margin-top: 30px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-color); margin-bottom: 20px; padding-bottom: 10px; }
  .section-title { font-family: 'Kanit', sans-serif; font-size: 22px; font-weight: 500; margin: 0; padding: 0; border: none; color: var(--col-hawthorne); }
  .data-table-wrapper { overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th, .data-table td { padding: 12px 15px; border-bottom: 1px solid var(--nav-border); text-align: left; font-size: 16px; }
  .data-table th { font-family: 'Kanit', sans-serif; font-size: 16px; background-color: var(--bg-color); color: var(--col-hawthorne); }
  .icon-button { background: none; border: none; cursor: pointer; font-size: 20px; padding: 5px; margin-right: 8px; }
  .edit-btn { color: var(--col-thistle); } .delete-btn { color: var(--col-royal); }
  .view-pets-btn { color: var(--col-hawthorne); } .reset-pass-btn { color: var(--color-orange); }

  /* --- 7. Modals --- */
  #modal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background-color: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; }
  .modal-overlay-close { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .modal-content { background: white; border-radius: 12px; padding: 30px 40px; width: 90%; max-width: 700px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .admin-filter-bar { background-color: #ffffff; border-radius: 12px; padding: 20px 25px; box-shadow: var(--shadow-light); margin-top: -10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 100px; gap: 15px; align-items: flex-end; }
  .admin-filter-bar .form-group { margin-bottom: 0; }
  
  .profile-details { font-size: 18px; line-height: 2; }
  .profile-details strong { font-family: 'Kanit', sans-serif; color: #555; min-width: 120px; display: inline-block; }
  .profile-actions { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 15px; }
  .profile-actions .form-button { width: auto; }
  .radio-button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .radio-button-group input[type="radio"] { display: none; }
  .radio-button-group .radio-btn { font-family: 'Kanit', sans-serif; font-size: 16px; background-color: var(--bg-color); border: 1px solid var(--nav-border); padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s ease; }
  .radio-button-group .radio-btn:hover { background-color: #e9e9e9; }
  .radio-button-group input[type="radio"]:checked + .radio-btn { background-color: var(--col-hawthorne); color: white; border-color: var(--col-hawthorne); }
  
  .stray-group-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; border: 1px solid #EEE; }
  .stray-group-header { padding: 15px; background: #FAFAFA; border-bottom: 1px solid #EEE; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .stray-group-header:hover { background: #F0F0F0; }
  .stray-item-row { padding: 12px 15px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; gap: 10px; font-family: 'Sarabun', sans-serif; font-size: 16px; }
  
  .map-controls { background: white; padding: 10px 15px; border-radius: 8px; box-shadow: var(--shadow-light); margin-bottom: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; font-family: 'Kanit', sans-serif; font-size: 15px; }
  
  .location-btn { background-color: var(--col-dusky-rose); color: #333; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: 'Kanit', sans-serif; }
  .location-btn:hover { background-color: #cbb0a5; }

  /* --- Media Queries (Mobile) --- */
  @media (max-width: 768px) {
    .navbar-title { font-size: 16px; white-space: normal; text-align: center; line-height: 1.2; }
    #app-navbar { height: auto; padding: 10px 15px; }
    #main-menu-bar { padding: 10px; gap: 10px; }
    .menu-welcome { width: 100%; text-align: center; margin-right: 0; margin-bottom: 5px; border-bottom: 1px solid #eee; }
    .nav-button { flex: 1; justify-content: center; font-size: 14px; padding: 8px 10px; }
    .dashboard-grid, .form-grid-4col, .dashboard-grid-2col, .form-grid, .admin-filter-bar, .charts-grid { grid-template-columns: 1fr; }
    .admin-filter-bar .form-button { width: 100%; }
    .form-input { font-size: 16px; }
    .form-group { margin-bottom: 10px; }
    .form-container { padding: 20px; }
    .chart-card-body { min-height: 220px; }
    .chart-card-header { flex-direction: column; align-items: flex-start; }
    .chart-card-subtitle { max-width: 100%; }
  }
</style>
